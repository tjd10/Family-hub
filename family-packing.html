<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Family Packing</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#071520;font-family:Georgia,serif;color:#e0f2fe;padding-bottom:60px}
    button{font-family:Georgia,serif;cursor:pointer}
    h1{font-size:22px;font-weight:normal;color:#f0f9ff}
    .header{background:linear-gradient(135deg,#0c2340,#071520);border-bottom:1px solid #1a3050;padding:20px 16px 0;position:sticky;top:0;z-index:20}
    .header-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
    .brand{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#38bdf8;margin-bottom:4px}
    .stats{text-align:right;font-size:12px;color:#7dd3fc}
    .critical-badge{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.35);border-radius:8px;padding:4px 10px;font-size:11px;color:#fca5a5;margin-bottom:4px}
    .progress{height:3px;background:#1a3050;border-radius:2px;margin:12px 0 0;overflow:hidden}
    .progress-bar{height:100%;background:linear-gradient(90deg,#0369a1,#38bdf8);border-radius:2px;transition:width .4s}
    .tabs{display:flex;overflow-x:auto;margin-top:12px}
    .tab{flex:1;min-width:58px;padding:8px 4px 10px;border:none;background:transparent;border-bottom:2px solid transparent;color:#3d6a8a;font-size:12px;font-family:Georgia,serif}
    .tab.active{border-bottom-color:var(--accent);color:var(--accent)}
    .content{max-width:600px;margin:0 auto;padding:20px 16px 0}
    .section{margin-bottom:24px}
    .section-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-left:2px;font-size:11px;letter-spacing:.15em;text-transform:uppercase}
    .section-count{margin-left:auto;color:#3d6a8a}
    .items{background:rgba(10,28,46,.7);border:1px solid #1a3050;border-radius:12px;overflow:hidden}
    .item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-top:1px solid #152840;transition:all .2s}
    .item:first-child{border-top:none}
    .item.packed{background:var(--light)}
    .item.skip{opacity:.35}
    .checkbox{width:24px;height:24px;border-radius:6px;border:2px solid #2a4a6a;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
    .checkbox.checked{background:var(--accent);border-color:var(--accent)}
    .dot{width:6px;height:6px;border-radius:50%;background:#ef4444;flex-shrink:0}
    .label{flex:1;font-size:14px;color:#d0eaff;transition:all .2s}
    .label.packed{color:#3d6a8a;text-decoration:line-through}
    .label.skip{color:#2a4a6a}
    .hand{font-size:10px;color:#2a6090;margin-left:6px}
    .qty-controls{display:flex;align-items:center;gap:5px;flex-shrink:0}
    .qty-btn{width:20px;height:20px;border-radius:4px;border:1px solid #1e3a5f;background:transparent;color:#7dd3fc;font-size:14px;display:flex;align-items:center;justify-content:center}
    .qty-val{font-size:13px;color:#38bdf8;min-width:16px;text-align:center}
    .skip-btn{width:26px;height:26px;border-radius:6px;border:1px solid #1e3a5f;background:transparent;color:#2a4a6a;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
    .skip-btn.skipped{border-color:#4d7a9a;background:rgba(77,122,154,.2);color:#7dd3fc}
    .add-row{display:flex;gap:8px;padding:10px 14px;border-top:1px solid #152840}
    .add-input{flex:1;background:rgba(14,165,233,.08);border:1px solid #2a4a6a;border-radius:6px;padding:6px 10px;color:#e0f2fe;font-size:14px;font-family:Georgia,serif;outline:none}
    .add-confirm{border:none;border-radius:6px;padding:6px 12px;color:#071520;font-size:13px;font-weight:bold;font-family:Georgia,serif}
    .add-cancel{background:transparent;border:1px solid #2a4a6a;border-radius:6px;padding:6px 10px;color:#7dd3fc;font-size:13px}
    .add-trigger{width:100%;padding:10px 14px;border:none;border-top:1px solid #152840;background:transparent;color:#2a5070;font-size:13px;text-align:left;font-family:Georgia,serif}
    .legend{display:flex;justify-content:center;gap:20px;font-size:11px;color:#3d6a8a;margin-bottom:24px;flex-wrap:wrap}
    .reset-btn{background:transparent;border:1px solid #1a3050;color:#3d6a8a;padding:10px 24px;border-radius:8px;font-size:13px;display:block;margin:0 auto 20px}
    svg{display:block}
  </style>

function setTab(p){ activePerson=p; addingItem=null; newItemLabel=””; render(); }
function toggle(p,t,id){ var item=data[p][t].find(i=>i.id===id); if(!item||item.state===“skip”)return; item.state=item.state===“unpacked”?“packed”:“unpacked”; save(); }
function skip(p,t,id){ var item=data[p][t].find(i=>i.id===id); if(!item)return; item.state=item.state===“skip”?“unpacked”:“skip”; save(); }
function qty(p,t,id,d){ var item=data[p][t].find(i=>i.id===id); if(!item)return; item.qty=Math.max(0,(item.qty||0)+d); save(); }
function startAdd(p,t){ addingItem={person:p,time:t}; newItemLabel=””; render(); }
function cancelAdd(){ addingItem=null; newItemLabel=””; render(); }
function addItem(p,t){ if(!newItemLabel.trim())return; data[p][t].push({id:“c_”+Date.now(),label:newItemLabel.trim(),critical:false,qty:0,state:“unpacked”,bag:t===“Days Before”?“suitcase”:“hand luggage”}); addingItem=null; newItemLabel=””; save(); }
function addKey(e,p,t){ if(e.key===“Enter”)addItem(p,t); if(e.key===“Escape”)cancelAdd(); }
function resetAll(){ if(confirm(“Reset all items for a new trip?”)){ data=JSON.parse(JSON.stringify(DEFAULT)); save(); } }

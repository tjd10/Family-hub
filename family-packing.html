<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Firebase Test</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body style="font-family:sans-serif; padding:40px; background:#071520; color:white;">
  <h2>Firebase Connection Test</h2>
  <div id="status" style="margin-top:20px; padding:20px; background:#0a1c2e; border-radius:8px;">
    Connecting...
  </div>

  <script>
    var status = document.getElementById("status");

    try {
      firebase.initializeApp({
        apiKey: "AIzaSyD2Lv-JLxB8XkDmSCbyejwJVdLrsd2G0Bg",
        authDomain: "family-hub-cefcb.firebaseapp.com",
        databaseURL: "https://family-hub-cefcb-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "family-hub-cefcb",
        storageBucket: "family-hub-cefcb.firebasestorage.app",
        messagingSenderId: "127444767723",
        appId: "1:127444767723:web:b9901ad035553d966fffae"
      });

      status.innerHTML = "✅ Firebase initialised. Trying database...";

      var db = firebase.database();
      db.ref("test").set({ time: Date.now() })
        .then(function() {
          status.innerHTML = "✅ Firebase connected and working! The main app should work too.";
          status.style.background = "#052e16";
        })
        .catch(function(err) {
          status.innerHTML = "❌ Database write failed: " + err.message;
          status.style.background = "#450a0a";
        });

    } catch(e) {
      status.innerHTML = "❌ Firebase init failed: " + e.message;
      status.style.background = "#450a0a";
    }
  </script>

</body>
</html>

var packingData=null;
var activePerson="Tim", addingItem=null, newItemLabel="";
var activeModal=null;
var newTripName="", newTripTravellers="", selectedTemplate=null;

auth.onAuthStateChanged(function(user){
  document.getElementById("loading").style.display="none";
  if(user){
    document.getElementById("login-screen").style.display="none";
    document.getElementById("app-screen").style.display="block";
    startListening();
  } else {
    document.getElementById("login-screen").style.display="flex";
    document.getElementById("app-screen").style.display="none";
  }
});

function signIn(){
  var email=document.getElementById("login-email").value.trim();
  var password=document.getElementById("login-password").value;
  var errEl=document.getElementById("login-error");
  errEl.textContent="";
  auth.signInWithEmailAndPassword(email,password).catch(function(){
    errEl.textContent="Incorrect email or password.";
  });
}
function signOut(){if(confirm("Sign out?"))auth.signOut();}
document.getElementById("login-password").addEventListener("keydown",function(e){if(e.key==="Enter")signIn();});

function startListening(){
  packingRef.on("value",function(snap){
    var val=snap.val();
    if(val&&val.currentTrip){
      packingData=val;
    } else {
      packingData=defaultPackingData();
      packingRef.set(packingData);
    }
    render();
  });
}

function freshTrip(name,travellers,items){
  return {id:"trip_"+Date.now(),name:name,travellers:travellers,createdAt:new Date().toISOString(),items:JSON.parse(JSON.stringify(items))};
}
function resetItems(items){
  var result=JSON.parse(JSON.stringify(items));
  for(var p in result)for(var t in result[p])for(var i=0;i<result[p][t].length;i++){result[p][t][i].state="unpacked";result[p][t][i].qty=0;}
  return result;
}
function defaultPackingData(){
  return {currentTrip:freshTrip("My First Trip","All family",DEFAULT_ITEMS),archive:[],templates:[]};
}

function save(){
  packingRef.set(packingData);
}

function toggle(p,t,id){
  var items=packingData.currentTrip.items[p][t];
  for(var i=0;i<items.length;i++){if(items[i].id===id){if(items[i].state==="skip")return;items[i].state=items[i].state==="unpacked"?"packed":"unpacked";break;}}
  save();
}
function skip(p,t,id){
  var items=packingData.currentTrip.items[p][t];
  for(var i=0;i<items.length;i++){if(items[i].id===id){items[i].state=items[i].state==="skip"?"unpacked":"skip";break;}}
  save();
}
function qty(p,t,id,d){
  var items=packingData.currentTrip.items[p][t];
  for(var i=0;i<items.length;i++){if(items[i].id===id){items[i].qty=Math.max(0,(items[i].qty||0)+d);break;}}
  save();
}
function addItemFn(p,t){
  if(!newItemLabel.trim())return;
  packingData.currentTrip.items[p][t].push({id:"c_"+Date.now(),label:newItemLabel.trim(),critical:false,qty:0,state:"unpacked",bag:t==="Days Before"?"suitcase":"hand luggage"});
  addingItem=null;newItemLabel="";save();
}
function startNewTrip(){
  if(!newTripName.trim()){alert("Please enter a trip name");return;}
  if(!packingData.archive)packingData.archive=[];
  packingData.archive.unshift(JSON.parse(JSON.stringify(packingData.currentTrip)));
  var baseItems=selectedTemplate?selectedTemplate.items:DEFAULT_ITEMS;
  packingData.currentTrip=freshTrip(newTripName.trim(),newTripTravellers.trim()||"All family",resetItems(baseItems));
  newTripName="";newTripTravellers="";selectedTemplate=null;
  activeModal=null;save();
}
function saveAsTemplate(){
  var name=prompt("Template name:");
  if(!name||!name.trim())return;
  if(!packingData.templates)packingData.templates=[];
  packingData.templates.push({id:"tpl_"+Date.now(),name:name.trim(),createdAt:new Date().toISOString(),items:resetItems(packingData.currentTrip.items)});
  save();
  alert("Saved as template: "+name.trim());
}
function restoreArchived(idx){
  if(!confirm("Restore '"+packingData.archive[idx].name+"'?"))return;
  var toRestore=packingData.archive.splice(idx,1)[0];
  packingData.archive.unshift(JSON.parse(JSON.stringify(packingData.currentTrip)));
  packingData.currentTrip=toRestore;
  activeModal=null;save();
}
function deleteArchived(idx){if(!confirm("Delete?"))return;packingData.archive.splice(idx,1);save();}
function deleteTemplate(idx){if(!confirm("Delete?"))return;packingData.templates.splice(idx,1);save();}
function renameTripFn(){
  var name=prompt("Rename trip:",packingData.currentTrip.name);
  if(name&&name.trim())packingData.currentTrip.name=name.trim();
  var trav=prompt("Who's going:",packingData.currentTrip.travellers||"All family");
  if(trav&&trav.trim())packingData.currentTrip.travellers=trav.trim();
  save();
}
function archiveAsTemplate(arcIdx){
  var name=prompt("Template name:");
  if(!name||!name.trim())return;
  if(!packingData.templates)packingData.templates=[];
  packingData.templates.push({id:"tpl_"+Date.now(),name:name.trim(),createdAt:new Date().toISOString(),items:resetItems(packingData.archive[arcIdx].items)});
  save();
}

function render(){
  if(!packingData){
    document.getElementById("app").innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#7dd3fc;font-size:16px;gap:12px"><div style="font-size:28px">&#128374;</div><div>Loading...</div></div>';
    return;
  }
  var c=COLORS[activePerson];
  var trip=packingData.currentTrip;
  var allItems=[],pi,ti,ii;
  for(pi=0;pi<PEOPLE.length;pi++)for(ti=0;ti<TIMES.length;ti++){var a=trip.items[PEOPLE[pi]][TIMES[ti]];for(ii=0;ii<a.length;ii++)allItems.push(a[ii]);}
  var totalActive=0,totalPacked=0,critUnpacked=0,i;
  for(i=0;i<allItems.length;i++){if(allItems[i].state!=="skip")totalActive++;if(allItems[i].state==="packed")totalPacked++;if(allItems[i].critical&&allItems[i].state==="unpacked")critUnpacked++;}
  var pct=totalActive?Math.round(totalPacked/totalActive*100):0;

  var html='<div class="header"><div style="max-width:600px;margin:0 auto">'
    +'<div class="brand"><span>&#128374; Family Packing <span class="sync-badge sync-live">&#9679; Live</span></span>'
    +'<button class="signout-btn" onclick="signOut()">Sign out</button></div>'
    +'<div class="header-top">'
    +'<div><div class="trip-name" onclick="renameTripFn()">&#9992; '+trip.name+' <span style="font-size:10px;color:#3d6a8a">('+( trip.travellers||"All family")+')</span> <span style="font-size:10px;color:#2a4a6a">&#9998;</span></div>'
    +'<h1>Master List</h1></div>'
    +'<div class="stats">'+(critUnpacked>0?'<div class="critical-badge">&#9888; '+critUnpacked+' critical unpacked</div>':'')
    +'<div>'+totalPacked+'/'+totalActive+' packed</div></div></div>'
    +'<div class="progress"><div class="progress-bar" style="width:'+pct+'%"></div></div>'
    +'<div class="tabs">';

  for(pi=0;pi<PEOPLE.length;pi++){
    var p=PEOPLE[pi],pc=COLORS[p],items=[],packed=0,active=0;
    for(ti=0;ti<TIMES.length;ti++){var arr=trip.items[p][TIMES[ti]];for(ii=0;ii<arr.length;ii++)items.push(arr[ii]);}
    for(i=0;i<items.length;i++){if(items[i].state!=="skip")active++;if(items[i].state==="packed")packed++;}
    html+='<button class="tab'+(p===activePerson?" active":"")+'" style="--accent:'+pc.accent+'" onclick="setTab(\''+p+'\')">'
      +'<div>'+(DISPLAY[p]||p)+'</div><div style="font-size:10px;opacity:.8">'+packed+'/'+active+'</div></button>';
  }
  html+='</div></div></div><div class="content">';

  for(ti=0;ti<TIMES.length;ti++){
    var time=TIMES[ti],its=trip.items[activePerson][time],ac=0,pc2=0;
    for(i=0;i<its.length;i++){if(its[i].state!=="skip")ac++;if(its[i].state==="packed")pc2++;}
    html+='<div class="section"><div class="section-header" style="color:'+c.accent+'">'
      +ICONS[time]+' '+time+'<span class="section-count">'+pc2+'/'+ac+'</span></div><div class="items">';
    for(i=0;i<its.length;i++){
      var item=its[i],isPacked=item.state==="packed",isSkip=item.state==="skip";
      html+='<div class="item'+(isPacked?" packed":"")+(isSkip?" skip":"")+'" style="--accent:'+c.accent+';--light:'+c.light+'">'
        +'<button class="checkbox'+(isPacked?" checked":"")+'" style="--accent:'+c.accent+'" onclick="toggle(\''+activePerson+'\',\''+time+'\',\''+item.id+'\')">'
        +(isPacked?'<svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4.5L4.5 8L11 1" stroke="#071520" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>':'')
        +'</button>'+(item.critical?'<div class="dot"></div>':'')
        +'<span class="label'+(isPacked?" packed":"")+(isSkip?" skip":"")+'">'
        +item.label+(item.bag==="hand luggage"?'<span class="hand">&#9992;</span>':'')+'</span>';
      if(!isSkip){
        html+='<div class="qty-controls">';
        if(item.qty>0)html+='<button class="qty-btn" onclick="qty(\''+activePerson+'\',\''+time+'\',\''+item.id+'\',-1)">&minus;</button><span class="qty-val">'+item.qty+'</span>';
        html+='<button class="qty-btn" onclick="qty(\''+activePerson+'\',\''+time+'\',\''+item.id+'\',1)">+</button></div>';
      }
      html+='<button class="skip-btn'+(isSkip?" skipped":"")+'" onclick="skip(\''+activePerson+'\',\''+time+'\',\''+item.id+'\')">'+(isSkip?"&#8629;":"&#10005;")+'</button></div>';
    }
    if(addingItem&&addingItem.person===activePerson&&addingItem.time===time){
      html+='<div class="add-row"><input class="add-input" id="newitem" placeholder="Item name..." oninput="newItemLabel=this.value" onkeydown="addKeyFn(event,\''+activePerson+'\',\''+time+'\')">'
        +'<button class="add-confirm" style="background:'+c.accent+'" onclick="addItemFn(\''+activePerson+'\',\''+time+'\')">Add</button>'
        +'<button class="add-cancel" onclick="cancelAdd()">&#10005;</button></div>';
    } else {
      html+='<button class="add-trigger" onclick="startAdd(\''+activePerson+'\',\''+time+'\')">+ Add item</button>';
    }
    html+='</div></div>';
  }

  html+='<div class="legend"><span>&#11044; Critical</span><span>Tap to pack &middot; &#10005; = not this trip</span><span>&#9992; = hand luggage</span></div>'
    +'<div class="btn-row">'
    +'<button class="btn-secondary" onclick="openTripsModal()">&#128218; Trips and Templates</button>'
    +'<button class="btn-primary" onclick="openNewTripModal()">+ New Trip</button>'
    +'</div></div>';

  // Trips modal
  html+='<div class="modal-bg'+(activeModal==="trips"?" open":"")+'" id="modal-trips" onclick="closeModalBg(event)">'
    +'<div class="modal"><h2>&#128218; Trips and Templates</h2>'
    +'<button class="btn-primary" style="width:100%;margin-bottom:16px" onclick="saveAsTemplate()">&#128190; Save current trip as template</button>'
    +'<div class="section-label">Templates</div>';
  if(!packingData.templates||packingData.templates.length===0){
    html+='<div class="empty-state">No templates yet.</div>';
  } else {
    for(i=0;i<packingData.templates.length;i++){
      var tpl=packingData.templates[i];
      html+='<div class="trip-card"><div class="trip-card-name">'+tpl.name+'</div>'
        +'<div class="trip-card-meta">Created '+tpl.createdAt.substring(0,10)+'</div>'
        +'<div class="trip-card-btns">'
        +'<button class="trip-card-btn template" onclick="useTemplate('+i+')">Use for new trip</button>'
        +'<button class="trip-card-btn" onclick="deleteTemplate('+i+')">Delete</button>'
        +'</div></div>';
    }
  }
  html+='<div class="section-label" style="margin-top:20px">Archived Trips</div>';
  if(!packingData.archive||packingData.archive.length===0){
    html+='<div class="empty-state">No archived trips yet.</div>';
  } else {
    for(i=0;i<packingData.archive.length;i++){
      var arc=packingData.archive[i];
      var arcItems=[],arcPacked=0,arcActive=0,pi2,ti2,ii2;
      for(pi2=0;pi2<PEOPLE.length;pi2++)for(ti2=0;ti2<TIMES.length;ti2++){var aa=arc.items[PEOPLE[pi2]][TIMES[ti2]];for(ii2=0;ii2<aa.length;ii2++)arcItems.push(aa[ii2]);}
      for(var j=0;j<arcItems.length;j++){if(arcItems[j].state!=="skip")arcActive++;if(arcItems[j].state==="packed")arcPacked++;}
      html+='<div class="trip-card"><div class="trip-card-name">'+arc.name+'</div>'
        +'<div class="trip-card-meta">'+(arc.travellers||"All family")+' &middot; '+arcPacked+'/'+arcActive+' packed &middot; '+arc.createdAt.substring(0,10)+'</div>'
        +'<div class="trip-card-btns">'
        +'<button class="trip-card-btn restore" onclick="restoreArchived('+i+')">Restore</button>'
        +'<button class="trip-card-btn template" onclick="archiveAsTemplate('+i+')">Save as template</button>'
        +'<button class="trip-card-btn" onclick="deleteArchived('+i+')">Delete</button>'
        +'</div></div>';
    }
  }
  html+='<div class="modal-btn-row"><button class="modal-btn-secondary" onclick="closeModal()">Close</button></div>'
    +'</div></div>';

  // New trip modal
  html+='<div class="modal-bg'+(activeModal==="newTrip"?" open":"")+'" id="modal-newtrip" onclick="closeModalBg(event)">'
    +'<div class="modal"><h2>+ New Trip</h2>'
    +(selectedTemplate?'<div style="font-size:12px;color:#a78bfa;margin-bottom:12px">Using template: '+selectedTemplate.name+'</div>':'')
    +'<input class="modal-input" id="new-trip-name" placeholder="Trip name (e.g. Lombok 2026)" oninput="newTripName=this.value" value="'+newTripName+'">'
    +'<input class="modal-input" id="new-trip-trav" placeholder="Who\'s going (e.g. Tim and Sarah)" oninput="newTripTravellers=this.value" value="'+newTripTravellers+'">'
    +'<p style="font-size:11px;color:#3d6a8a;margin-bottom:12px">The current trip will be archived. All items reset to unpacked.</p>'
    +'<div class="modal-btn-row">'
    +'<button class="modal-btn-primary" onclick="startNewTrip()">Start Trip</button>'
    +'<button class="modal-btn-secondary" onclick="closeModal()">Cancel</button>'
    +'</div></div></div>';

  document.getElementById("app").innerHTML=html;
  if(addingItem){var inp=document.getElementById("newitem");if(inp){inp.focus();inp.value=newItemLabel;}}
}

function setTab(p){activePerson=p;addingItem=null;newItemLabel="";render();}
function startAdd(p,t){addingItem={person:p,time:t};newItemLabel="";render();}
function cancelAdd(){addingItem=null;newItemLabel="";render();}
function addKeyFn(e,p,t){if(e.key==="Enter")addItemFn(p,t);if(e.key==="Escape")cancelAdd();}
function openTripsModal(){activeModal="trips";render();}
function openNewTripModal(){activeModal="newTrip";render();}
function closeModal(){activeModal=null;render();}
function closeModalBg(e){if(e.target===e.currentTarget)closeModal();}
function useTemplate(idx){selectedTemplate=packingData.templates[idx];activeModal="newTrip";render();}
</script>
</body>
</html>

const PEOPLE = ["Tim", "Sarah", "Paula", "Zoe", "Shared"];
const TIMES = ["Days Before", "Morning Of", "Last Minute"];
const DISPLAY_NAME = { Zoe: "Zoë" };
const personColors = {
  Tim:    { accent: "#0ea5e9", light: "rgba(14,165,233,0.1)" },
  Sarah:  { accent: "#f59e0b", light: "rgba(245,158,11,0.1)" },
  Paula:  { accent: "#10b981", light: "rgba(16,185,129,0.1)" },
  Zoe:    { accent: "#a78bfa", light: "rgba(167,139,250,0.1)" },
  Shared: { accent: "#fb7185", light: "rgba(251,113,133,0.1)" },
};
const timeIcons = { "Days Before": "📦", "Morning Of": "🌅", "Last Minute": "⚡" };

function App() {
  const [data, setData] = useState(null);
  const [activePerson, setActivePerson] = useState("Tim");
  const [addingItem, setAddingItem] = useState(null);
  const [newItemLabel, setNewItemLabel] = useState("");
  const [syncStatus, setSyncStatus] = useState("loading"); // "loading" | "live" | "error"
  const isRemoteUpdate = useRef(false);

  // Wait for Firebase to be ready, then subscribe
  useEffect(() => {
    const setup = () => {
      const db = window._firebaseDb;
      const fbRef = window._firebaseRef;
      const onValue = window._firebaseOnValue;
      const fbSet = window._firebaseSet;
      const fbGet = window._firebaseGet;

      if (!db) { setSyncStatus("error"); return; }

      const dataRef = fbRef(db, DB_PATH);

      // First load: if DB is empty, seed with defaultData
      fbGet(dataRef).then(snapshot => {
        if (!snapshot.exists()) {
          fbSet(dataRef, JSON.parse(JSON.stringify(defaultData)));
        }
      });

      // Subscribe to live updates
      const unsubscribe = onValue(dataRef, (snapshot) => {
        const val = snapshot.val();
        if (val) {
          isRemoteUpdate.current = true;
          setData(val);
          setSyncStatus("live");
        } else {
          setData(JSON.parse(JSON.stringify(defaultData)));
          setSyncStatus("live");
        }
      }, (error) => {
        console.error("Firebase error:", error);
        setSyncStatus("error");
        // Fall back to defaultData if Firebase fails
        setData(JSON.parse(JSON.stringify(defaultData)));
      });

      return unsubscribe;
    };

    if (window._firebaseReady) {
      setup();
    } else {
      window.addEventListener("firebaseReady", setup, { once: true });
    }
  }, []);

  // Save to Firebase (debounced slightly to avoid write storms on qty changes)
  const saveTimeout = useRef(null);
  const saveToFirebase = useCallback((newData) => {
    setData(newData);
    if (saveTimeout.current) clearTimeout(saveTimeout.current);
    saveTimeout.current = setTimeout(() => {
      const db = window._firebaseDb;
      const fbRef = window._firebaseRef;
      const fbSet = window._firebaseSet;
      if (db) {
        fbSet(fbRef(db, DB_PATH), newData).catch(err => {
          console.error("Save failed:", err);
          setSyncStatus("error");
        });
      }
    }, 300);
  }, []);

  const cycleState = (person, time, id) => {
    const nd = JSON.parse(JSON.stringify(data));
    const item = nd[person][time].find(i => i.id === id);
    if (!item || item.state === "skip") return;
    item.state = item.state === "unpacked" ? "packed" : "unpacked";
    saveToFirebase(nd);
  };

  const toggleSkip = (person, time, id) => {
    const nd = JSON.parse(JSON.stringify(data));
    const item = nd[person][time].find(i => i.id === id);
    if (!item) return;
    item.state = item.state === "skip" ? "unpacked" : "skip";
    saveToFirebase(nd);
  };

  const changeQty = (person, time, id, delta) => {
    const nd = JSON.parse(JSON.stringify(data));
    const item = nd[person][time].find(i => i.id === id);
    if (!item) return;
    item.qty = Math.max(0, (item.qty || 0) + delta);
    saveToFirebase(nd);
  };

  const addItem = (person, time) => {
    if (!newItemLabel.trim()) return;
    const nd = JSON.parse(JSON.stringify(data));
    nd[person][time].push({
      id: `c_${Date.now()}`,
      label: newItemLabel.trim(),
      critical: false, qty: 0, state: "unpacked",
      bag: time === "Days Before" ? "suitcase" : "hand luggage"
    });
    saveToFirebase(nd);
    setNewItemLabel(""); setAddingItem(null);
  };

  const reset = () => {
    if (confirm("Reset all items for a new trip? This will clear everyone's progress.")) {
      saveToFirebase(JSON.parse(JSON.stringify(defaultData)));
    }
  };

  if (!data) return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100vh", color:"#7dd3fc", fontSize:16, gap:12 }}>
      <div style={{ fontSize:28 }}>🕶️</div>
      <div>Connecting to Family Hub…</div>
      <div style={{ fontSize:12, color:"#3d6a8a" }}>Syncing with Firebase</div>
    </div>
  );

  const color = personColors[activePerson];
  const allItems = PEOPLE.flatMap(p => TIMES.flatMap(t => data[p][t]));
  const totalActive = allItems.filter(i => i.state !== "skip").length;
  const totalPacked = allItems.filter(i => i.state === "packed").length;
  const criticalUnpacked = allItems.filter(i => i.critical && i.state === "unpacked").length;

  const syncLabel = syncStatus === "live" ? "Live" : syncStatus === "loading" ? "Connecting…" : "Offline";

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(180deg,#071520 0%,#0a1c2e 60%,#071520 100%)", paddingBottom:60 }}>

      {/* Header */}
      <div style={{ background:"linear-gradient(135deg,#0c2340,#071520)", borderBottom:"1px solid #1a3050", padding:"24px 20px 0", position:"sticky", top:0, zIndex:20 }}>
        <div style={{ maxWidth:600, margin:"0 auto" }}>
          <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:4 }}>
            <div>
              <div style={{ fontSize:11, letterSpacing:"0.2em", textTransform:"uppercase", color:"#38bdf8", marginBottom:4 }}>
                🕶️ Family Packing
                <span style={{ marginLeft:10, fontSize:10, letterSpacing:"0.1em" }}>
                  <span className={`sync-dot ${syncStatus}`} />
                  {syncLabel}
                </span>
              </div>
              <h1 style={{ margin:0, fontSize:22, fontWeight:"normal", color:"#f0f9ff" }}>Master List</h1>
            </div>
            <div style={{ textAlign:"right" }}>
              {criticalUnpacked > 0 && (
                <div style={{ background:"rgba(239,68,68,0.15)", border:"1px solid rgba(239,68,68,0.35)", borderRadius:8, padding:"4px 10px", fontSize:11, color:"#fca5a5", marginBottom:4 }}>
                  ⚠️ {criticalUnpacked} critical unpacked
                </div>
              )}
              <div style={{ fontSize:12, color:"#7dd3fc" }}>{totalPacked}/{totalActive} packed</div>
            </div>
          </div>
          <div style={{ height:3, background:"#1a3050", borderRadius:2, margin:"12px 0 0", overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${totalActive ? Math.round(totalPacked/totalActive*100) : 0}%`, background:"linear-gradient(90deg,#0369a1,#38bdf8)", borderRadius:2, transition:"width 0.4s" }} />
          </div>
          <div style={{ display:"flex", marginTop:12, overflowX:"auto" }}>
            {PEOPLE.map(p => {
              const c = personColors[p];
              const active = p === activePerson;
              const items = TIMES.flatMap(t => data[p][t]);
              const packed = items.filter(i => i.state === "packed").length;
              const activeCount = items.filter(i => i.state !== "skip").length;
              return (
                <button key={p} onClick={() => setActivePerson(p)} style={{ flex:1, minWidth:58, padding:"8px 4px 10px", border:"none", background:"transparent", borderBottom:active ? `2px solid ${c.accent}` : "2px solid transparent", color:active ? c.accent : "#3d6a8a", cursor:"pointer", fontSize:12, transition:"all 0.2s" }}>
                  <div style={{ fontWeight:active?"bold":"normal" }}>{DISPLAY_NAME[p] || p}</div>
                  <div style={{ fontSize:10, marginTop:1, opacity:0.8 }}>{packed}/{activeCount}</div>
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {/* List */}
      <div style={{ maxWidth:600, margin:"0 auto", padding:"20px 16px 0" }}>
        {TIMES.map(time => {
          const items = data[activePerson][time];
          const activeItems = items.filter(i => i.state !== "skip");
          const packedItems = items.filter(i => i.state === "packed");
          return (
            <div key={time} style={{ marginBottom:24 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8, paddingLeft:2 }}>
                <span>{timeIcons[time]}</span>
                <span style={{ fontSize:11, letterSpacing:"0.15em", textTransform:"uppercase", color:color.accent }}>{time}</span>
                <span style={{ marginLeft:"auto", fontSize:11, color:"#3d6a8a" }}>{packedItems.length}/{activeItems.length}</span>
              </div>
              <div style={{ background:"rgba(10,28,46,0.7)", border:"1px solid #1a3050", borderRadius:12, overflow:"hidden" }}>
                {items.map((item, idx) => {
                  const isPacked = item.state === "packed";
                  const isSkip = item.state === "skip";
                  return (
                    <div key={item.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"11px 14px", borderTop:idx===0?"none":"1px solid #152840", background:isPacked?color.light:"transparent", opacity:isSkip?0.35:1, transition:"all 0.2s" }}>
                      <button onClick={() => cycleState(activePerson, time, item.id)} style={{ width:24, height:24, borderRadius:6, flexShrink:0, cursor:"pointer", transition:"all 0.2s", border:isPacked?`2px solid ${color.accent}`:"2px solid #2a4a6a", background:isPacked?color.accent:"transparent", display:"flex", alignItems:"center", justifyContent:"center" }}>
                        {isPacked && <svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4.5L4.5 8L11 1" stroke="#071520" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                      </button>
                      {item.critical && <div style={{ width:6, height:6, borderRadius:"50%", background:"#ef4444", flexShrink:0 }} />}
                      <span style={{ flex:1, fontSize:14, color:isPacked?"#3d6a8a":isSkip?"#2a4a6a":"#d0eaff", textDecoration:isPacked?"line-through":"none", transition:"all 0.2s" }}>
                        {item.label}
                        {item.bag === "hand luggage" && <span style={{ fontSize:10, color:"#2a6090", marginLeft:6 }}>✈</span>}
                      </span>
                      {!isSkip && (
                        <div style={{ display:"flex", alignItems:"center", gap:5, flexShrink:0 }}>
                          {item.qty > 0 && <button onClick={() => changeQty(activePerson, time, item.id, -1)} style={{ width:20, height:20, borderRadius:4, border:"1px solid #1e3a5f", background:"transparent", color:"#7dd3fc", cursor:"pointer", fontSize:14, display:"flex", alignItems:"center", justifyContent:"center" }}>−</button>}
                          {item.qty > 0 && <span style={{ fontSize:13, color:"#38bdf8", minWidth:16, textAlign:"center" }}>{item.qty}</span>}
                          <button onClick={() => changeQty(activePerson, time, item.id, 1)} style={{ width:20, height:20, borderRadius:4, border:"1px solid #1e3a5f", background:"transparent", color:"#7dd3fc", cursor:"pointer", fontSize:14, display:"flex", alignItems:"center", justifyContent:"center" }}>+</button>
                        </div>
                      )}
                      <button onClick={() => toggleSkip(activePerson, time, item.id)} title={isSkip?"Include this trip":"Not this trip"} style={{ width:26, height:26, borderRadius:6, border:isSkip?"1px solid #4d7a9a":"1px solid #1e3a5f", background:isSkip?"rgba(77,122,154,0.2)":"transparent", color:isSkip?"#7dd3fc":"#2a4a6a", cursor:"pointer", fontSize:12, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, transition:"all 0.2s" }}>{isSkip?"↩":"✕"}</button>
                    </div>
                  );
                })}
                {addingItem?.person === activePerson && addingItem?.time === time ? (
                  <div style={{ display:"flex", gap:8, padding:"10px 14px", borderTop:"1px solid #152840" }}>
                    <input autoFocus value={newItemLabel} onChange={e => setNewItemLabel(e.target.value)}
                      onKeyDown={e => { if (e.key==="Enter") addItem(activePerson,time); if (e.key==="Escape") { setAddingItem(null); setNewItemLabel(""); }}}
                      placeholder="Item name…"
                      style={{ flex:1, background:"rgba(14,165,233,0.08)", border:"1px solid #2a4a6a", borderRadius:6, padding:"6px 10px", color:"#e0f2fe", fontSize:14, fontFamily:"Georgia,serif", outline:"none" }}
                    />
                    <button onClick={() => addItem(activePerson,time)} style={{ background:color.accent, border:"none", borderRadius:6, padding:"6px 12px", color:"#071520", cursor:"pointer", fontSize:13, fontWeight:"bold" }}>Add</button>
                    <button onClick={() => { setAddingItem(null); setNewItemLabel(""); }} style={{ background:"transparent", border:"1px solid #2a4a6a", borderRadius:6, padding:"6px 10px", color:"#7dd3fc", cursor:"pointer", fontSize:13 }}>✕</button>
                  </div>
                ) : (
                  <button onClick={() => setAddingItem({person:activePerson,time})} style={{ width:"100%", padding:"10px 14px", border:"none", borderTop:"1px solid #152840", background:"transparent", color:"#2a5070", cursor:"pointer", fontSize:13, textAlign:"left", fontFamily:"Georgia,serif" }}>
                    + Add item
                  </button>
                )}
              </div>
            </div>
          );
        })}

        <div style={{ display:"flex", justifyContent:"center", gap:20, fontSize:11, color:"#3d6a8a", marginBottom:24, flexWrap:"wrap" }}>
          <span><span style={{ display:"inline-block", width:6, height:6, borderRadius:"50%", background:"#ef4444", marginRight:4, verticalAlign:"middle" }}/>Critical</span>
          <span>Tap ☐ to pack · ✕ = not this trip</span>
          <span>✈ = hand luggage</span>
        </div>

        <div style={{ textAlign:"center", paddingBottom:20 }}>
          <button onClick={reset} style={{ background:"transparent", border:"1px solid #1a3050", color:"#3d6a8a", padding:"10px 24px", borderRadius:8, fontSize:13, cursor:"pointer", fontFamily:"Georgia,serif" }}>
            Reset for new trip
          </button>
        </div>
      </div>
    </div>
  );
}
